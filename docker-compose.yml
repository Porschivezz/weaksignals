version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: weaksignals-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: weaksignals
      POSTGRES_USER: weaksignals
      POSTGRES_PASSWORD: weaksignals_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weaksignals -d weaksignals"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weaksignals-net

  redis:
    image: redis:7-alpine
    container_name: weaksignals-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weaksignals-net

  neo4j:
    image: neo4j:5-community
    container_name: weaksignals-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/weaksignals_dev
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
    networks:
      - weaksignals-net

  backend:
    build:
      context: ./backend
    container_name: weaksignals-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-weaksignals_dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    networks:
      - weaksignals-net

  celery-worker:
    build:
      context: ./backend
    container_name: weaksignals-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-weaksignals_dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    command: celery -A app.workers.celery_app worker -l info -c 2
    volumes:
      - ./backend:/app
    networks:
      - weaksignals-net

  celery-beat:
    build:
      context: ./backend
    container_name: weaksignals-celery-beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://weaksignals:weaksignals_dev@postgres:5432/weaksignals}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-weaksignals_dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    command: celery -A app.workers.celery_app beat -l info
    volumes:
      - ./backend:/app
    networks:
      - weaksignals-net

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://ws.huginnmuninn.tech/api/v1}
    container_name: weaksignals-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://ws.huginnmuninn.tech/api/v1}
    networks:
      - weaksignals-net

  nginx:
    image: nginx:alpine
    container_name: weaksignals-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - weaksignals-net

networks:
  weaksignals-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
